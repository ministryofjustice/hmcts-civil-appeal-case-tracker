version: 2.1
orbs:
  aws-cli: circleci/aws-cli@4.0.0
  aws-ecr: circleci/aws-ecr@8.2.1

jobs:
  build:
    parameters:
      env_name:
        type: string
      ecr_role_var:
        type: string
      ecr_endpoint_var:
        type: string
      run_smoke_test:
        type: boolean
        default: false
      run_functional_tests:
        type: boolean
        default: false
    executor: aws-ecr/default
    machine:
      image: ubuntu-2204:edge

    steps:
      - checkout
      - aws-cli/setup:
          role_arn: << parameters.ecr_role_var >>
          region: $ECR_REGION
      - restore_cache:
          keys:
            - deps-gradle-v1-{{ checksum "build.gradle" }}
            - deps-gradle-v1-
      - run:
          name: Test
          command: |
            ./gradlew test
      - run:
          name: Build
          command: |
            ./gradlew --no-daemon clean build
      - save_cache:
          key: deps-gradle-v1-{{ checksum "build.gradle" }}
          paths:
            - ~/.gradle-docker
      - run:
          name: Verify boot jar
          command: |
            ls -l build-gradle/libs/
            if ! ls build-gradle/libs/*.jar >/dev/null 2>&1; then
              echo "Boot jar not found in build-gradle/libs"
              exit 1
            fi
      - run:
          name: Build Docker images
          command: |
            docker build -t civil-appeal-case-tracker:${CIRCLE_SHA1} .
            docker build -f Dockerfile.monitor -t civil-appeal-case-tracker-monitor:${CIRCLE_SHA1} .
            docker build -f Dockerfile.maintenance -t civil-appeal-case-tracker-maintenance:${CIRCLE_SHA1} .
            docker image ls
      - store_test_results:
          path: build-gradle/test-results/test
      - store_artifacts:
          path: build-gradle/reports/tests/test
          destination: test-results
      - when:
          condition: << parameters.run_smoke_test >>
          steps:
            - run:
                name: Start Postgres container for tests
                command: |
                  docker network create cact-test-net
                  docker run -d \
                    --name cact-postgres \
                    --network cact-test-net \
                    -e POSTGRES_USER=cact_user \
                    -e POSTGRES_PASSWORD=cact_password \
                    -e POSTGRES_DB=cact \
                    postgres:16
            - run:
                name: Wait for Postgres and apply database schema
                command: |
                  timeout 60 bash -c 'until docker exec cact-postgres pg_isready -U cact_user -d cact; do echo "waiting for postgres..."; sleep 2; done'
                  docker cp files/setup.sql cact-postgres:/setup.sql
                  docker exec cact-postgres psql -U cact_user -d cact -f /setup.sql
            - run:
                name: Start app container
                command: |
                  docker run -d --name cact-app --network cact-test-net -p 8080:8080 \
                    -e DB_HOST=cact-postgres \
                    -e DB_PORT=5432 \
                    -e DB_USER=cact_user \
                    -e DB_PASSWORD=cact_password \
                    -e DB_NAME=cact \
                    -e ADMIN_USER=$ADMIN_USER \
                    -e ADMIN_PASS=$ADMIN_PASSWORD \
                    -e ENVIRONMENT=<< parameters.env_name >> \
                    civil-appeal-case-tracker:${CIRCLE_SHA1}
            - run:
                name: Wait for app to be ready
                command: |
                  timeout 90 bash -c 'until curl -sf http://localhost:8080/health; do echo "waiting for app..."; sleep 3; done'
            - run:
                name: Run smoke tests
                command: |
                  chmod +x bin/smoke-test.sh
                  BASE_URL=http://localhost:8080 bin/smoke-test.sh
      - when:
          condition: << parameters.run_functional_tests >>
          steps:
            - restore_cache:
                keys:
                  - deps-yarn-v1-{{ checksum "e2e/yarn.lock" }}-{{ arch }}
                  - deps-yarn-v1-{{ checksum "e2e/yarn.lock" }}
                  - deps-yarn-v1-
            - restore_cache:
                keys:
                  - playwright-browsers-v1-{{ checksum "e2e/yarn.lock" }}-{{ arch }}
                  - playwright-browsers-v1-{{ checksum "e2e/yarn.lock" }}
                  - playwright-browsers-v1-
            - run:
                name: Install Playwright
                working_directory: e2e
                command: |
                  corepack enable
                  yarn install --immutable
                  yarn playwright install --with-deps chromium
            - run:
                name: Run Playwright e2e tests
                working_directory: e2e
                environment:
                  BASE_URL: http://localhost:8080
                  PLAYWRIGHT_HTML_REPORT: playwright-report/e2e
                command: |
                  export ADMIN_USER="$ADMIN_USER"
                  export ADMIN_PASS="$ADMIN_PASSWORD"
                  yarn test:e2e
            - run:
                name: Run Playwright accessibility tests
                working_directory: e2e
                environment:
                  BASE_URL: http://localhost:8080
                  PLAYWRIGHT_HTML_REPORT: playwright-report/accessibility
                command: |
                  export ADMIN_USER="$ADMIN_USER"
                  export ADMIN_PASS="$ADMIN_PASSWORD"
                  yarn test:accessibility
            - save_cache:
                key: deps-yarn-v1-{{ checksum "e2e/yarn.lock" }}-{{ arch }}
                paths:
                  - e2e/node_modules
            - save_cache:
                key: playwright-browsers-v1-{{ checksum "e2e/yarn.lock" }}-{{ arch }}
                paths:
                  - ~/.cache/ms-playwright
            - store_artifacts:
                path: e2e/playwright-report
                destination: playwright-report
      - when:
          condition: << parameters.run_smoke_test >>
          steps:
            - run:
                name: Show app container logs
                when: on_fail
                command: docker logs cact-app || true
      - run:
          name: Tag and push images to repo
          command: |
            login="$(aws ecr get-login-password --region eu-west-2)"
            echo ${login} | docker login --username AWS --password-stdin << parameters.ecr_endpoint_var >>
            docker tag civil-appeal-case-tracker:${CIRCLE_SHA1} << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-app-${CIRCLE_SHA1}
            docker tag civil-appeal-case-tracker-monitor:${CIRCLE_SHA1} << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-monitor-${CIRCLE_SHA1}
            docker tag civil-appeal-case-tracker-maintenance:${CIRCLE_SHA1} << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-maintenance-${CIRCLE_SHA1}
            docker push << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-app-${CIRCLE_SHA1}
            docker push << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-monitor-${CIRCLE_SHA1}
            docker push << parameters.ecr_endpoint_var >>:civil-appeal-case-tracker-maintenance-${CIRCLE_SHA1}

  deploy:
    parameters:
      env_name:
        type: string
      k8s_token_var:
        type: string
    docker:
      - image: ministryofjustice/cloud-platform-tools
    steps:
      - checkout
      - run:
          name: Authenticate to LIVE cluster
          command: |
            echo -n ${K8S_CLUSTER_CERT} | base64 -d > ./ca.crt
            cat ./ca.crt
            kubectl config set-cluster ${K8S_CLUSTER_NAME} --certificate-authority=./ca.crt --server=https://${K8S_CLUSTER_NAME}
            kubectl config set-credentials circleci --token=<< parameters.k8s_token_var >>
            kubectl config set-context ${K8S_CLUSTER_NAME} --cluster=${K8S_CLUSTER_NAME} --user=circleci --namespace=civil-appeal-case-tracker-<< parameters.env_name >>
            kubectl config use-context ${K8S_CLUSTER_NAME}
      - run:
          name: rolling update image
          command: |
            sed -i -e s/CIRCLE_SHA1/$CIRCLE_SHA1/ deploy_kubernetes/<< parameters.env_name >>/app-deployment.yaml
            sed -i -e s/CIRCLE_SHA1/$CIRCLE_SHA1/ deploy_kubernetes/<< parameters.env_name >>/monitor-deployment.yaml
            sed -i -e s/CIRCLE_SHA1/$CIRCLE_SHA1/ deploy_kubernetes/<< parameters.env_name >>/maintenance-deployment.yaml
            kubectl apply -n civil-appeal-case-tracker-<< parameters.env_name >> -f deploy_kubernetes/<< parameters.env_name >>

workflows:
  build:
    jobs:
      ### DEV ###
      - build:
          name: build-and-test-dev
          env_name: dev
          ecr_role_var: "$ECR_ROLE_TO_ASSUME_DEV"
          ecr_endpoint_var: "$ECR_ENDPOINT_DEV"
          run_smoke_test: true
          run_functional_tests: true
          context:
            - civil-appeal-case-tracker-dev
          filters:
            branches:
              only: /^RST-.*/

      - deploy:
          name: deploy-dev
          env_name: dev
          k8s_token_var: "$K8S_TOKEN_DEV"
          context:
            - civil-appeal-case-tracker-dev
          filters:
            branches:
              only: /^RST-.*/
          requires:
            - build-and-test-dev

      ### PREPROD ###
      - build:
          name: build-preprod
          env_name: preprod
          ecr_role_var: "$ECR_ROLE_TO_ASSUME_PREPROD"
          ecr_endpoint_var: "$ECR_ENDPOINT_PREPROD"
          run_smoke_test: true
          context:
            - civil-appeal-case-tracker-preprod
          filters:
            branches:
              only: /^staging$/

      - approve_preprod:
          type: approval
          requires:
            - build-preprod

      - deploy:
          name: deploy-preprod
          env_name: preprod
          k8s_token_var: "$K8S_TOKEN_PREPROD"
          context:
            - civil-appeal-case-tracker-preprod
          filters:
            branches:
              only: /^staging$/
          requires:
            - approve_preprod

      ### PROD ###
      - build:
          name: build-prod
          env_name: prod
          ecr_role_var: "$ECR_ROLE_TO_ASSUME_PROD"
          ecr_endpoint_var: "$ECR_ENDPOINT_PROD"
          context:
            - civil-appeal-case-tracker-prod
          filters:
            branches:
              only: /^main$/

      - approve_production:
          type: approval
          requires:
            - build-prod

      - deploy:
          name: deploy-prod
          env_name: prod
          k8s_token_var: "$K8S_TOKEN_PROD"
          context:
            - civil-appeal-case-tracker-prod
          filters:
            branches:
              only: /^main$/
          requires:
            - approve_production
