plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'java'
    id 'war'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    flatDir {
        dirs 'libs'
    }
}

sourceSets {
    main {
        java {
            srcDir 'WEB-INF/src'
        }
    }
    test {
        java {
            srcDir 'test'
        }
    }
}

configurations {
    antClasspath
}

dependencies {
    antClasspath 'org.apache.ant:ant-junit:1.10.15'
    antClasspath 'org.apache.ant:ant-junit4:1.10.15'
}

ant.properties['ant.home'] = '.'
ant.importBuild('build.xml') { antTargetName -> 'ant-' + antTargetName }

// Make ant-junit available to Ant's classloader
configurations.antClasspath.files.each { file ->
    ant.project.class.classLoader.addURL(file.toURI().toURL())
}

clean {
    delete 'build', 'testresult', 'deploy'

}