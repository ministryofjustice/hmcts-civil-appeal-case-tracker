kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: civil-appeal-case-tracker-prometheus-scraping
  namespace: civil-appeal-case-tracker-prod
spec:
  podSelector:
    matchLabels:
      app: civil-appeal-case-tracker-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              component: monitoring
